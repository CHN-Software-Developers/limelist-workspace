<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Limelist Workspace</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <h1>Limelist <span>Workspace</span></h1>
    </div>
    <div class="date-nav">
      <button id="prevDay" class="icon-btn" title="Previous day">‹</button>
      <button id="todayBtn" class="today-btn">Today</button>
      <button id="nextDay" class="icon-btn" title="Next day">›</button>
      <div class="date-label" id="dateLabel">—</div>
    </div>
    <div class="right-cluster">
      <div class="stats" id="stats"></div>
      <button id="importBtn" class="header-btn" title="Copy tasks from another day">⇄ Import day</button>
    </div>
  </header>

  <main class="layout">
    <section class="timeline-wrap" id="timelineWrap">
      <div class="timeline" id="timeline"></div>
    </section>
  </main>

  <!-- Floating add button -->
  <button id="fab" class="fab" title="Add task" aria-label="Add task">+</button>

  <!-- ===== Task editor popover ===== -->
  <div class="overlay hidden" id="taskOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Task editor">
      <button class="modal-close" id="taskClose" title="Close">×</button>
      <form id="taskForm" autocomplete="off">
        <h2 id="editorTitle">New task</h2>

        <label class="field">
          <span>Task</span>
          <input type="text" id="taskName" placeholder="What are you working on?" maxlength="80" required />
        </label>

        <div class="time-row">
          <label class="field">
            <span>Start</span>
            <input type="time" id="startTime" required />
          </label>
          <label class="field">
            <span>End</span>
            <input type="time" id="endTime" required />
          </label>
        </div>

        <div class="field">
          <span>Color</span>
          <div class="swatches" id="swatches"></div>
        </div>

        <p class="form-error" id="formError"></p>

        <!-- shown only when editing an existing task -->
        <div class="dup-row hidden" id="dupRow">
          <span>Duplicate to</span>
          <input type="date" id="dupDate" />
          <button type="button" id="dupBtn" class="ghost-btn">Duplicate</button>
        </div>

        <div class="form-actions">
          <button type="submit" class="primary-btn" id="submitBtn">Add task</button>
          <button type="button" class="ghost-btn danger hidden" id="deleteBtn">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== Import popover ===== -->
  <div class="overlay hidden" id="importOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Import tasks">
      <button class="modal-close" id="importClose" title="Close">×</button>
      <h2>Import a day</h2>
      <p class="modal-sub">Copy every task from another day into the day you're viewing.</p>

      <label class="field">
        <span>From day</span>
        <select id="importSource"></select>
      </label>

      <label class="field">
        <span>How</span>
        <select id="importMode">
          <option value="merge">Add to existing tasks</option>
          <option value="replace">Replace existing tasks</option>
        </select>
      </label>

      <p class="form-error" id="importError"></p>

      <div class="form-actions">
        <button type="button" class="primary-btn" id="importConfirm">Import</button>
        <button type="button" class="ghost-btn" id="importCancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
